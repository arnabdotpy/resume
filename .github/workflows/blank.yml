name: Build Resume

on:
  push:
    paths:
      - "resume.tex"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended poppler-utils

      - name: Compile LaTeX
        run: pdflatex resume.tex

      - name: Convert PDF to PNG
        run: pdftoppm -png -singlefile resume.pdf resume

      - name: Commit PNG preview
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add resume.png
          git commit -m "Update resume preview" || echo "No changes"
          git push
